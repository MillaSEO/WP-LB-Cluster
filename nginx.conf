events {
    worker_connections 1024;
}

http {
    upstream wp_cluster {
        # Балансировка между контейнерами WordPress
        server wp1:80;
        server wp2:80;
    }

    server {
        listen 80;
        server_name _; # Знак подчеркивания означает "принимать любой IP и любой домен"

        location / {
            proxy_pass http://wp_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
