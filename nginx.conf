events {
    worker_connections 1024;
}

http {
    upstream wp_cluster {
        # IP Hash гарантирует, что один пользователь всегда попадает на один и тот же сервер
        ip_hash; 
        
        server wp1:80;
        server wp2:80;
    }

    server {
        listen 80;
        server_name _; 

        location / {
            proxy_pass http://wp_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Максимальный размер загружаемого файла (чтобы картинки не выдавали ошибку 413)
            client_max_body_size 64M;
        }
    }
}
